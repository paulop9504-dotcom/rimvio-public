name: Nightly QA

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Nightly QA runner
        run: npm run self-learning:nightly

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-qa-report
          path: .cursor/nightly-qa-report.json
          if-no-files-found: ignore
